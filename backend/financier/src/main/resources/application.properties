spring.application.name=financier
# Optional local-only overrides (secrets, dev credentials). Not committed to git.
spring.config.import=optional:application-local.properties

spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.docker.compose.file=financier/compose.yaml
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT - must be provided via env var JWT_SECRET or application-local.properties.
application.security.jwt.secret=${JWT_SECRET:}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}
server.servlet.context-path=/api
# Keep security logging quiet by default; override in application-local.properties for debugging.
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Actuator - exposes just health; probes liveness/readiness ready for the orchestrators (k8s) 
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

cors.allowed-origins=http://localhost:3000

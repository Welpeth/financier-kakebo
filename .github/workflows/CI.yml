name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build + tests (Maven/Java) and optional SonarQube analysis
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/financier

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Use the service container above, not the local docker-compose.
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      DB_URL: jdbc:postgresql://localhost:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # CI-only signing key (>= 256 bits). NOT a real secret.
      JWT_SECRET: ci-only-test-secret-not-real-please-override-0123456789abcdef
      # SonarCloud: only SONAR_TOKEN is required (already set as a repo secret).
      # Host defaults to SonarCloud; override via the SONAR_HOST_URL secret if self-hosted.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so SonarQube can assign blame/new-code correctly.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & test
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: backend/financier/target/surefire-reports/
          if-no-files-found: ignore

      - name: Check SonarQube config
        id: sonarcfg
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN not set — skipping SonarQube analysis"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube analysis
        if: steps.sonarcfg.outputs.run == 'true'
        run: |
          mvn -B -ntp org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=Welpeth_financier-kakebo \
            -Dsonar.projectName=financier-kakebo \
            -Dsonar.organization=welpeth \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  # ---------------------------------------------------------------------------
  # CodeQL static security analysis (Java + JS/TS)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Manual build (Java)
        if: matrix.language == 'java-kotlin'
        working-directory: backend/financier
        run: mvn -B -ntp clean compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
